name: Build (self-hosted, through Nexus)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Point npm at my Nexus proxy
        run: |
          cat > .npmrc <<'EOF'
          registry=http://localhost:8081/repository/demo-npm-proxy/
          //localhost:8081/repository/demo-npm-proxy/:_auth=YWRtaW46YWRtaW4xMjM=
          email=demo@sonatype.com
          EOF

      - name: Force a fresh pull so everything flows through Nexus
        run: rm -rf node_modules package-lock.json

      - name: Install dependencies (watch them come through Nexus)
        run: npm install --omit=dev --ignore-scripts --loglevel=http

      - name: Compile check — every JS file, zero errors
        run: |
          find . -path ./node_modules -prune -o -name '*.js' -print0 | xargs -0 -r -n1 node --check
          echo "All files compiled with zero errors."
