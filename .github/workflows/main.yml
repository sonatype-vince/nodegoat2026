name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Use public npm registry (ignore local Nexus .npmrc)
        run: |
          rm -f .npmrc
          npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --omit=dev --ignore-scripts

      - name: Compile check — every JS file must parse with zero errors
        run: |
          echo "Syntax-checking all source files..."
          node --check server.js
          find app config -name "*.js" -print0 | xargs -0 -n1 node --check
          echo "All files compiled with zero errors."
